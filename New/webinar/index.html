<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Webinar Reel Preview - FedSafe Retirement</title>
  <link rel="icon" href="../favicon.ico">
  <style>
    :root {
      color-scheme: dark;
      --navy: #061d32;
      --blue: #002f57;
      --red: #c1260d;
      --gold: #f4c95d;
      --paper: #f6f1e8;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(193, 38, 13, 0.24), transparent 34%),
        linear-gradient(180deg, var(--blue), var(--navy));
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 460px);
      gap: 44px;
      align-items: center;
      padding: 40px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 42px;
    }

    .brand-mark {
      width: 92px;
      height: auto;
      display: block;
      border-radius: 10px;
      background: var(--white);
      padding: 10px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      margin: 0 0 10px;
    }

    h1 {
      font-size: clamp(42px, 6vw, 76px);
      line-height: 0.96;
      letter-spacing: 0;
      margin: 0 0 24px;
    }

    .copy {
      max-width: 560px;
      color: var(--paper);
      font-size: 21px;
      line-height: 1.45;
      margin: 0;
    }

    .date-pill {
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      border: 2px solid var(--gold);
      border-radius: 999px;
      padding: 0 20px;
      margin-top: 28px;
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--white);
      background: rgba(6, 29, 50, 0.72);
    }

    .video-shell {
      width: min(100%, 452px);
      justify-self: end;
    }

    .phone-frame {
      position: relative;
      width: 100%;
      padding: 46px 14px 14px;
      border: 3px solid #111923;
      border-radius: 48px;
      background:
        linear-gradient(145deg, #29313b 0%, #080c11 48%, #313b45 100%);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.45),
        inset 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .phone-frame::before,
    .phone-frame::after {
      content: "";
      position: absolute;
      background: #080c11;
      border-radius: 999px;
      opacity: 0.95;
    }

    .phone-frame::before {
      width: 4px;
      height: 72px;
      left: -7px;
      top: 128px;
    }

    .phone-frame::after {
      width: 4px;
      height: 104px;
      right: -7px;
      top: 190px;
    }

    .phone-screen {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .phone-speaker {
      position: absolute;
      z-index: 2;
      top: 22px;
      left: 50%;
      width: 92px;
      height: 7px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #090d12;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.14),
        0 8px 18px rgba(0, 0, 0, 0.24);
      pointer-events: none;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 9 / 16;
      border: 0;
      border-radius: 0;
      background: #000;
    }

    .note {
      color: rgba(246, 241, 232, 0.78);
      font-size: 13px;
      line-height: 1.4;
      margin: 12px 0 0;
      text-align: center;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 28px 0 40px;
      }

      .brand {
        margin-bottom: 28px;
      }

      .video-shell {
        justify-self: center;
        width: min(100%, 390px);
      }

      .phone-frame {
        border-radius: 40px;
        padding: 40px 11px 11px;
      }

      .phone-screen {
        border-radius: 29px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section aria-label="Preview details">
      <div class="brand">
        <img class="brand-mark" src="../assets/logos/Fedsafe-Logo-Only_aHR0cHM6.webp" alt="FedSafe Retirement">
        <div>
          <p class="eyebrow">Partner approval preview</p>
          <strong>FedSafe Retirement</strong>
        </div>
      </div>
      <p class="eyebrow">Instagram and Facebook reel</p>
      <h1>June 28 webinar reel</h1>
      <p class="copy">Review the final vertical reel before it is posted to Instagram and the new Facebook page.</p>
      <div class="date-pill">Sunday June 28th</div>
    </section>
    <section class="video-shell" aria-label="Webinar reel video">
      <div class="phone-frame">
        <div class="phone-speaker"></div>
        <div class="phone-screen">
          <video controls preload="metadata" playsinline src="../assets/videos/fedsafe-june28-webinar-reel-approval.mp4"></video>
        </div>
      </div>
      <p class="note">Unlisted review page. Not linked from the public site navigation.</p>
    </section>
  </main>
</body>
</html>
